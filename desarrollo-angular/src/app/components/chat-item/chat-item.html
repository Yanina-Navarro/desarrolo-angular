<div class="chat-item" (click)="openChat()">
  <div class="avatar"></div>

  <div class="info">
    <div class="name">{{ chat.name }}</div>

    @if (chat.online) {
    <div class="status online">● Online</div>
    } @else {
    <div class="status offline">
      Últ. vez: {{ chat.lastSeen | customDate }}
    </div>
    }
  </div>
