<h3>{{ chat?.name }}</h3>

<div class="messages">
  @for (msg of chat?.messages; track msg) {
    <div [class.mine]="msg.mine" [class.other]="!msg.mine">
      <p>{{ msg.text }}</p>
      <small>{{ msg.time | date:'shortTime' }}</small>
    </div>
  }
</div>

<input [formControl]="messageControl" />
<button (click)="sendMessage()">Enviar</button>
