<div class="sidebar-header">
  <h3>Chats</h3>
  <button routerLink="/nuevo">+</button>
</div>

<input type="text" placeholder="Buscar..." [formControl]="searchControl" class="search" />

<div class="chat-list">
  @for (chat of chats(); track chat.id) {
  <app-chat-item [chat]="chat"></app-chat-item>
  }
</div>
